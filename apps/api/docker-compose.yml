version: "3.9"

services:
  db:
    image: postgres:16
    container_name: yardwatch-db
    restart: always
    environment:
      POSTGRES_USER: yardwatch
      POSTGRES_PASSWORD: yardwatch123
      POSTGRES_DB: yardwatch
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
volumes:
  db_data: